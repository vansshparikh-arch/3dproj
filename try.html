<!DOCTYPE html>
<html>

<head>
    <title>Konva 2D Example</title>
    <script src="https://unpkg.com/konva@9/konva.min.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f0f0f0;
        }

        #container {
            border: 1px solid #ccc;
        }
    </style>
</head>

<body>
    <div id="container"></div>

    <script>
        // 3. Initialize the Stage
        const stage = new Konva.Stage({
            container: 'container', // The ID of the div above
            width: 500,
            height: 400,
        });

        // 4. Create a Layer
        const layer = new Konva.Layer();

        // 5. Create a Shape (a draggable rectangle)
        const rect = new Konva.Rect({
            x: 50,
            y: 50,
            width: 150,
            height: 100,
            fill: '#ff0044',
            stroke: 'black',
            strokeWidth: 4,
            shadowBlur: 10,
            draggable: true, // This single line makes the rectangle draggable!
        });

        // Add interactivity: Change color when hovered
        rect.on('mouseenter', function () {
            stage.container().style.cursor = 'pointer';
            this.fill('#00dd88'); // Change color
        });

        rect.on('mouseleave', function () {
            stage.container().style.cursor = 'default';
            this.fill('#ff0044'); // Revert color
        });

        // 6. Add the shape to the layer, and the layer to the stage
        layer.add(rect);
        stage.add(layer); // Adding a layer to a stage automatically draws it
    </script>
</body>

</html>
